name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Validate configs
        run: |
          python -m imagent_bench.config validate configs/local-smoke.yaml
          python -m imagent_bench.config validate configs/image-agent-smoke.yaml
          python -m imagent_bench.config validate configs/pr-gate.yaml
          python -m imagent_bench.config validate configs/api-gate.yaml

      - name: Run fixture smoke benchmark
        run: |
          python -m imagent_bench.runner \
            --config configs/local-smoke.yaml \
            --agent tests/fixtures/echo_agent \
            --output results/local-smoke
